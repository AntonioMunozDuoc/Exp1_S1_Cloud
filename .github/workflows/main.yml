```yaml
name: CI-CD Microservices

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Login Docker Hub
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build courseservice
      - name: Build Course Service
        run: |
          cd courseservice
          mvn clean package -DskipTests

      # 5. Build enrollmentservice
      - name: Build Enrollment Service
        run: |
          cd enrollmentservice
          mvn clean package -DskipTests

      # 6. Build + Push courseservice
      - name: Build and Push Course Service
        uses: docker/build-push-action@v6
        with:
          context: ./courseservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/courseservice:latest

      # 7. Build + Push enrollmentservice
      - name: Build and Push Enrollment Service
        uses: docker/build-push-action@v6
        with:
          context: ./enrollmentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/enrollmentservice:latest

      # 8. Crear SSH Key
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 9. Deploy EC2
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            cd Exp1_S1_Cloud

            docker compose pull

            docker compose down

            docker compose up -d

          EOF
```
