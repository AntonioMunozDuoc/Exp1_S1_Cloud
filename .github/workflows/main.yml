
name: CI-CD Microservices

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Course Service
        run: |
          cd courseservice
          mvn clean package -DskipTests

      - name: Build Enrollment Service
        run: |
          cd enrollmentservice
          mvn clean package -DskipTests

      - name: Build and Push Course Service
        uses: docker/build-push-action@v6
        with:
          context: ./courseservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/courseservice:latest

      - name: Build and Push Enrollment Service
        uses: docker/build-push-action@v6
        with:
          context: ./enrollmentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/enrollmentservice:latest

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd Exp1_S1_Cloud

            docker compose pull

            docker compose down

            docker compose up -d

          EOF